name: Test

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || echo "pip install failed, trying workaround..."
          pip install "traceforge @ git+https://github.com/VicenteVila/TraceForge.git"

      - name: Verify dependencies
        run: python -c "import traceforge; print(f'traceforge {traceforge.__version__} OK')" 2>/dev/null || true

      - name: Create minimal .env for CI
        run: |
          echo "use_ollama=False" >> .env
          echo "use_groq=False" >> .env
          echo "auto_confirm=True" >> .env
          echo "use_scoping_agent=True" >> .env

      - name: Run tests
        run: pytest tests/ -v --tb=long 2>&1
