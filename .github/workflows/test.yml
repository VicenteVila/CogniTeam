name: Test

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Create minimal .env for CI
        run: |
          echo "use_ollama=False" >> .env
          echo "use_groq=False" >> .env
          echo "auto_confirm=True" >> .env
          echo "use_scoping_agent=True" >> .env

      - name: Run tests
        run: |
          exit_code=0
          pytest tests/ -v --tb=long 2>&1 | tee /tmp/test_output.txt || exit_code=$?
          echo '## Test output' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/test_output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          exit $exit_code
